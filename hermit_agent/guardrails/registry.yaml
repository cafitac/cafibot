# HermitAgent Guardrail Registry — G1–G52
# activate_when: null → always_active
# Syntax: {dim: "<v" | ">v" | "==v" | "<=v" | ">=v"} / all: [...] / any: [...]

G1:
  name: jsonl_structured_log
  description: Log session events in JSONL structured format
  always_active: true
  rationale: Observability — model-independent

G2:
  name: subagent_separate_log
  description: Separate subagent logs into dedicated files
  always_active: true
  rationale: Observability — model-independent

G24:
  name: edit_file_unified_diff
  description: Display edit_file results in unified diff format
  always_active: true
  rationale: Structural UX improvement

G25:
  name: compact_threshold_dynamic
  description: compact threshold = ctx_window * 0.75
  always_active: true
  rationale: Compact strategy effective for all LLMs

G26:
  name: edit_loop_guard
  description: Block after 3 consecutive edits on same file + test failure, force read
  activate_when:
    any:
      - tool_spam_tendency: ">0.2"
      - instruction_following: "<0.8"
  rationale: Prevent speculative edits by weaker models

G27:
  name: background_tool_execution
  description: bash run_in_background + MonitorTool
  always_active: true
  rationale: Non-blocking handling of long-running tasks

G28:
  name: compact_log_accuracy
  description: Ensure compact log message accuracy
  always_active: true
  rationale: Observability

G29A:
  name: skill_lazy_load
  description: On-demand SKILL.md loading per phase
  activate_when:
    context_window: "<=65536"
  rationale: 128k+ models have sufficient headroom for full injection

G30:
  name: llm_timeout
  description: Set LLM response timeout
  always_active: true
  rationale: Required for all models

G31:
  name: hermit_agent_state_path
  description: .hermit/ path-based state/skill file management
  always_active: true
  rationale: Structural improvement

G32:
  name: assistant_text_logging
  description: Log LLM final text to session.jsonl
  always_active: true
  rationale: Observability

G33:
  name: pytest_exit_code_distinction
  description: Distinguish pytest exit codes (0/1/2/3/4/5)
  always_active: true
  rationale: Structural improvement

G34:
  name: deep_interview_skip_routing
  description: Inject explicit routing directives into skill Phase Announce
  activate_when:
    instruction_following: "<0.85"
  rationale: Stronger models interpret skill directives on their own

G36:
  name: interrupt_context_reset
  description: Reset context on interrupt
  always_active: true
  rationale: Structural improvement

G37:
  name: decimal_phase_label_matching
  description: Match phase labels by number (supports 1.5)
  always_active: true
  rationale: Structural improvement

G38:
  name: empty_response_summary_enforce
  description: Force summary on empty response
  activate_when:
    self_reporting: "<0.5"
  rationale: Prevent empty-response loops in weaker models

G38b:
  name: text_loop_detection
  description: Break loop on 3 consecutive identical texts
  activate_when:
    self_reporting: "<0.5"
  rationale: Prevent repetitive responses in weaker models

G39:
  name: worktree_path_auto_redirect
  description: Auto-detect and redirect worktree paths
  always_active: true
  rationale: Structural improvement

G40:
  name: write_file_output_format
  description: Improve write_file output UI format
  always_active: true
  rationale: UX

G41:
  name: pr_body_pinned_reminder
  description: Inject PR body as compact surviving pinned reminder
  activate_when:
    long_context_reasoning: "<0.7"
  rationale: Prevent spec amnesia in weaker models

G42:
  name: existing_test_update_on_failure
  description: Instruct to update existing tests on test failure
  activate_when:
    instruction_following: "<0.85"
  rationale: Weaker models tend to skip modifying existing tests

G43:
  name: skill_active_mcp_mode
  description: Auto-set _skill_active in MCP mode
  always_active: true
  rationale: Structural improvement

G44:
  name: monitor_incremental_streaming
  description: MonitorTool incremental output (offset tracking)
  always_active: true
  rationale: Structural UX improvement

G45:
  name: phase4_run_tests_gate
  description: Force run_tests before Phase 4 completion declaration in feature-develop
  activate_when:
    instruction_following: "<0.85"
  rationale: Prevent premature completion claims in weaker models

G46:
  name: mcp_bidirectional_reply_task
  description: Bidirectional HermitAgent ↔ Claude Code communication via MCP reply_task
  always_active: true
  rationale: Structural feature

G47:
  name: hermit_agent_mcp_relay_pattern
  description: Document deep-interview relay pattern
  always_active: true
  rationale: Operational pattern

G48:
  name: edit_loop_guard_test_failure_only
  description: Trigger loop guard only after test failure (allow planned edits)
  activate_when:
    tool_spam_tendency: ">0.2"
  rationale: Distinguish planned multi-edits from speculative edits

G49:
  name: run_tests_tool_enforcement
  description: Enforce run_tests tool usage (prohibit direct bash pytest)
  activate_when:
    instruction_following: "<0.85"
  rationale: Prevent tool bypass in weaker models

G50:
  name: phase35_unimplemented_method_check
  description: Grep-verify unimplemented method references at Phase 3.5
  activate_when:
    instruction_following: "<0.85"
  rationale: Weaker models add method references without implementation

G51:
  name: phase15_pattern_save_enforce
  description: Force save exploration results as patterns.md at Phase 1.5
  activate_when:
    long_context_reasoning: "<0.7"
  rationale: Prevent inefficient pattern re-exploration at Phase 3 in weaker models

G52:
  name: skill_load_auto_continue_boost
  description: Set MAX_AUTO_CONTINUE=999 when _skill_active
  activate_when:
    instruction_following: "<0.85"
  rationale: Prevent auto-continue exhaustion during skill phase loading
